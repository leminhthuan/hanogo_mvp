<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HanoGo Admin Console — MVP Demo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --blue:#1E88E5; --blue-d:#1565C0; --blue-l:#E6F1FB;
    --err:#D32F2F; --err-l:#FDECEA; --warn:#ED6C02; --warn-l:#FFF4E5;
    --ok:#2E7D32; --ok-l:#E8F5E9; --hero:#F59E0B; --hero-l:#FEF3E2;
    --ink:#1A2027; --muted:#5B6570; --hint:#8A93A0;
    --line:#E3E8EF; --bg:#F4F6F9; --card:#FFFFFF;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hidden{display:none!important}

  /* ---------- Login ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1E88E5 0%,#1565C0 100%);padding:20px}
  .login-card{width:380px;background:#fff;border-radius:16px;padding:34px 30px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
  .logo-tile{width:58px;height:58px;border-radius:15px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:20px;letter-spacing:.5px}
  .login-card h1{font-size:20px;margin:14px 0 2px}
  .login-card p.sub{color:var(--hint);font-size:13px;margin:0}
  .btn-sso{width:100%;height:46px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
  .btn-sso:hover{background:var(--blue-d)}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--hint);font-size:12px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  label.fld{font-size:13px;color:var(--muted);display:block;margin:0 0 5px}
  .inp{width:100%;height:40px;border:1px solid var(--line);border-radius:8px;padding:0 12px;margin-bottom:13px}
  .inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
  .btn-login{width:100%;height:42px;background:#fff;border:1px solid var(--blue);color:var(--blue);border-radius:8px;font-weight:600;font-size:14px}
  .btn-login:hover{background:var(--blue-l)}
  .login-note{font-size:11px;color:var(--hint);text-align:center;margin-top:20px;line-height:1.7}
  .login-err{background:var(--err-l);color:var(--err);font-size:13px;padding:9px 12px;border-radius:8px;margin-bottom:12px}

  /* ---------- Shell ---------- */
  #app{display:none;min-height:100vh}
  .topbar{height:56px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;position:sticky;top:0;z-index:20;gap:14px}
  .topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700}
  .brand-tile{width:32px;height:32px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .top-org{margin-left:6px;padding:5px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .bell{position:relative;color:var(--muted);cursor:pointer}
  .bell .dot{position:absolute;top:-3px;right:-3px;width:15px;height:15px;background:var(--err);color:#fff;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-l);color:var(--blue-d);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .btn-logout{border:1px solid var(--line);background:#fff;border-radius:8px;height:32px;padding:0 12px;font-size:13px;color:var(--muted)}
  .btn-logout:hover{border-color:var(--err);color:var(--err)}

  .layout{display:flex}
  .sidebar{width:238px;background:#fff;border-right:1px solid var(--line);height:calc(100vh - 56px);overflow-y:auto;position:sticky;top:56px;flex-shrink:0;padding:10px 0 30px}
  .grp{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--hint);margin:14px 16px 4px;font-weight:700}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13.5px;color:var(--muted);cursor:pointer;border-left:3px solid transparent}
  .nav:hover{background:#F7F9FC}
  .nav.active{background:var(--blue-l);color:var(--blue-d);border-left-color:var(--blue);font-weight:600}
  .nav svg{flex-shrink:0}
  .nav .txt{flex:1}
  .pri{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:5px;letter-spacing:.3px}
  .p0{background:var(--err-l);color:var(--err)} .p1{background:var(--warn-l);color:var(--warn)} .p2{background:#EEF0F3;color:var(--hint)}

  .content{flex:1;min-width:0;padding:22px 26px 60px}
  .page-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:16px}
  .page-h h2{font-size:20px;margin:0}
  .page-h .desc{color:var(--muted);font-size:13px;margin:3px 0 0}

  .btn{height:38px;padding:0 15px;border-radius:8px;font-size:13.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:#F7F9FC}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.pri:hover{background:var(--blue-d)}
  .btn.sm{height:30px;padding:0 11px;font-size:12.5px;font-weight:500}
  .btn.danger{color:var(--err);border-color:#F3C7C4}
  .btn.danger:hover{background:var(--err-l)}
  .btn.ok{color:var(--ok);border-color:#BEE0C1}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
  .metric .lbl{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .metric .val{font-size:26px;font-weight:700;margin-top:5px}
  .metric .val.warn{color:var(--warn)} .metric .val.err{color:var(--err)} .metric .val.ok{color:var(--ok)}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px}
  .panel h3{font-size:15px;margin:0 0 4px}
  .panel .sub{color:var(--muted);font-size:12.5px;margin:0 0 12px}
  .row2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}

  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;color:var(--muted);font-weight:600;padding:9px 10px;border-bottom:2px solid var(--line);white-space:nowrap}
  td{padding:11px 10px;border-bottom:1px solid var(--line);font-size:13.5px}
  tr:hover td{background:#FAFBFD}
  .tag{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
  .t-ok{background:var(--ok-l);color:var(--ok)} .t-warn{background:var(--warn-l);color:var(--warn)}
  .t-err{background:var(--err-l);color:var(--err)} .t-info{background:var(--blue-l);color:var(--blue-d)}
  .t-mut{background:#EEF0F3;color:var(--muted)}
  .ava-sm{width:28px;height:28px;border-radius:50%;background:var(--blue-l);color:var(--blue-d);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;vertical-align:middle;margin-right:8px}

  .task{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line)}
  .task .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .task .m{flex:1;min-width:0}
  .task .m .t1{font-size:13.5px} .task .m .t2{font-size:11.5px;color:var(--hint);margin-top:2px}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:13px 18px;border-radius:10px;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:100;display:flex;align-items:center;gap:9px;max-width:360px;animation:sl .25s ease}
  @keyframes sl{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}

  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .search{position:relative;flex:1;min-width:200px;max-width:340px}
  .search input{width:100%;height:38px;border:1px solid var(--line);border-radius:8px;padding:0 12px 0 34px}
  .search input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}
  .search svg{position:absolute;left:10px;top:9px;color:var(--hint)}
  select.filter{height:38px;border:1px solid var(--line);border-radius:8px;padding:0 10px;color:var(--muted);background:#fff}

  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
  .bar-row .name{width:120px;color:var(--muted)}
  .bar-track{flex:1;height:16px;background:#EEF2F7;border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;background:var(--blue);border-radius:6px}
  .bar-row .pct{width:44px;text-align:right;font-weight:600}

  .day{width:22px;height:22px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;margin-right:3px}
  .day.on{background:var(--blue-l);color:var(--blue-d);font-weight:600} .day.off{background:#F0F2F5;color:var(--hint)}

  .map-wrap{display:grid;grid-template-columns:1fr 200px;gap:16px}
  #supLeaflet{height:440px;border-radius:10px;border:1px solid var(--line);z-index:1}
  .leaflet-popup-content{font-family:inherit;font-size:13px;margin:10px 12px}
  .leaflet-popup-content b{font-size:13.5px}
  .pin{width:13px;height:13px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.08)}
  .legend div{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);padding:4px 0}
  .legend .sw{width:12px;height:12px;border-radius:3px}

  .kv{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line);font-size:13.5px}
  .kv:first-child{border-top:none}
  .switch{width:40px;height:22px;border-radius:20px;background:#CBD2DB;position:relative;cursor:pointer;transition:.15s;flex-shrink:0}
  .switch.on{background:var(--blue)}
  .switch::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.15s}
  .switch.on::after{left:20px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px}
  .form-grid .f label{font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px}
  .form-grid .f .inp{margin-bottom:0}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12.5px;background:#F3F5F8;padding:2px 6px;border-radius:5px}
  .empty{color:var(--hint);font-size:13px;text-align:center;padding:26px}
  @media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)}.row2,.map-wrap,.form-grid{grid-template-columns:1fr}.sidebar{position:fixed;z-index:30;transform:translateX(-100%)}}
</style>

let supTimer=null, supMap=null, supMarkers=[];
const SUP_COLORS={ok:"#2E7D32",err:"#D32F2F",warn:"#ED6C02",blue:"#1E88E5",off:"#9AA3AD"};
const SUP_STATUS={ok:"Viếng thăm có đơn",err:"Viếng thăm không đơn",warn:"Khách hàng đóng cửa",blue:"Đang di chuyển",off:"Offline"};
// Rải NVBH quanh các quận Hà Nội thật
const SUP_CENTERS=[[21.0308,105.7963,"Cầu Giấy"],[21.0170,105.8283,"Đống Đa"],[21.0352,105.8143,"Ba Đình"],[21.0285,105.8520,"Hoàn Kiếm"],[21.0080,105.8480,"Hai Bà Trưng"],[20.9950,105.8050,"Thanh Xuân"]];
function buildSupAgents(){
  const arr=[]; const keys=["ok","ok","ok","ok","blue","err","warn","off"];
  DB.employees.forEach((e,i)=>{
    const c=SUP_CENTERS[i%SUP_CENTERS.length];
    arr.push({name:e.name,area:c[2],lat:c[0]+(Math.random()-.5)*0.022,lng:c[1]+(Math.random()-.5)*0.028,st:keys[i%keys.length],visit:e.visit,rev:e.rev});
  });
  // thêm vài agent phụ cho dày bản đồ
  for(let i=0;i<28;i++){const c=SUP_CENTERS[i%SUP_CENTERS.length];arr.push({name:"NVBH "+VN[i%VN.length].split(" ").slice(-1)[0]+" "+(i+16),area:c[2],lat:c[0]+(Math.random()-.5)*0.024,lng:c[1]+(Math.random()-.5)*0.03,st:keys[(i+3)%keys.length],visit:Math.floor(Math.random()*25),rev:(Math.random()*25).toFixed(1)});}
  return arr;
}
function initSupMap(){
  const el=document.getElementById("supLeaflet"); if(!el) return;
  if(typeof L==="undefined"){el.innerHTML='<div class="empty" style="padding:60px">Bản đồ cần kết nối mạng để tải OpenStreetMap.<br>Khi lên production, đổi lớp tile sang Google Maps với API key của công ty.</div>';return;}
  if(supMap){supMap.remove();supMap=null;supMarkers=[];}
  supMap=L.map(el,{zoomControl:true,attributionControl:true}).setView([21.024,105.83],12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"}).addTo(supMap);
  const agents=buildSupAgents();
  agents.forEach(a=>{
    const m=L.circleMarker([a.lat,a.lng],{radius:7,color:"#fff",weight:2,fillColor:SUP_COLORS[a.st],fillOpacity:.95});
    m.bindPopup(`<b>${a.name}</b><br>Khu vực: ${a.area}<br>Trạng thái: ${SUP_STATUS[a.st]}<br>Viếng thăm hôm nay: ${a.visit}<br>Doanh số: ${a.rev} tr`);
    m.addTo(supMap); m._st=a.st; supMarkers.push(m);
  });
}

function refreshSup(){
  const rev=document.getElementById("mRev");if(!rev)return;
  const j=n=>n+Math.floor(Math.random()*7-2);
  rev.textContent=(312+Math.floor(Math.random()*9))+" tr";
  document.getElementById("mOrd").textContent=(1204+Math.floor(Math.random()*20)).toLocaleString("vi");
  document.getElementById("mVis").textContent=(1560+Math.floor(Math.random()*15)).toLocaleString("vi");
  document.getElementById("mHit").textContent=(76+Math.floor(Math.random()*4))+"%";
  document.getElementById("supOn").textContent=j(195);
  // đổi màu vài marker để mô phỏng cập nhật realtime
  if(supMarkers.length){const keys=["ok","err","warn","blue"];for(let k=0;k<3;k++){const m=supMarkers[Math.floor(Math.random()*supMarkers.length)];const st=keys[Math.floor(Math.random()*keys.length)];m.setStyle({fillColor:SUP_COLORS[st]});}}
}
